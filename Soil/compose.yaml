services:
  db:
    image: postgres:15
    container_name: soil_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: soil_monitoring
    ports:
      - "5434:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
   
volumes:
  postgres_data: